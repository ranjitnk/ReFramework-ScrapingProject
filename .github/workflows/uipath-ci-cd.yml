name: UiPath REFramework CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # FIX 1: Explicitly install the mandatory compiler framework engine
    - name: Setup .NET Desktop Runtime 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install UiPath CLI
      run: npm install -g @uipath/cli

    # FIX 2: Swapped modern rpa parser to legacy validation parsing engines
    - name: Validate Legacy UiPath Architecture
      run: uip rpa-legacy validate . --log-level error

    # FIX 3: Changed flag from --output-directory to the required -o flag
    - name: Pack Legacy Automation Project
      run: uip rpa-legacy pack . -o "artifacts/"

    # FIX 4: Explicitly passed repository environment secrets into the deploy task command
    - name: Deploy Package to Orchestrator
      run: >
        uip orchestrator deploy 
        --package-path "artifacts/" 
        --folder-name "Shared" 
        --url "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" 
        --organization "${{ secrets.UIPATH_ORGANIZATION }}" 
        --tenant "${{ secrets.UIPATH_TENANT }}" 
        --client-id "${{ secrets.UIPATH_CLIENT_ID }}" 
        --client-secret "${{ secrets.UIPATH_CLIENT_SECRET }}"
