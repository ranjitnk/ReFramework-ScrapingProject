name: UiPath CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: windows-latest
    outputs:
      packageVersion: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install UiPath CLI
        shell: pwsh
        run: |
          dotnet tool install -g UiPath.CLI.Windows

      - name: Verify UiPath CLI
        shell: pwsh
        run: |
          uipcli --version

      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $ver = "1.0.${{ github.run_number }}"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Output Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output

      - name: Pack Project
        shell: pwsh
        run: |
          uipcli package pack `
            "." `
            -o output `
            -v "${{ steps.version.outputs.version }}"

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package
          path: output/*.nupkg

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: windows-latest
    environment: Production

    env:
      UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
      UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
      UIPATH_ORGANIZATION: ${{ secrets.UIPATH_ORGANIZATION }}
      UIPATH_TENANT: ${{ secrets.UIPATH_TENANT }}
      UIPATH_FOLDER_PROD: ${{ secrets.UIPATH_FOLDER_PROD }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: output

      - name: Install UiPath CLI
        shell: pwsh
        run: |
          dotnet tool install -g UiPath.CLI.Windows

      - name: Verify UiPath CLI
        shell: pwsh
        run: |
          uipcli --version

      - name: Deploy and Create Process in Orchestrator
        shell: pwsh
        run: |
          $pkg = Get-ChildItem output\*.nupkg | Select-Object -First 1

          # uipcli package deploy handles upload, authentication, and process creation in one step
          uipcli package deploy `
            $pkg.FullName `
            "https://cloud.uipath.com/" `
            $env:UIPATH_TENANT `
            -A $env:UIPATH_ORGANIZATION `
            -I $env:UIPATH_CLIENT_ID `
            -S $env:UIPATH_CLIENT_SECRET `
            --applicationScope "OR.Folders OR.BackgroundTasks OR.Execution OR.Assets" `
            -o "$env:UIPATH_FOLDER_PROD" `
            --processName "REFramework Scraping with Queue" `
            --createProcess true `
            --traceLevel Information