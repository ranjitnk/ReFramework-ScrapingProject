name: UiPath REFramework CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  ARTIFACT_DIR: ./artifacts
  PROJECT_PATH: ./project.json

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Validate Project File
      shell: powershell
      run: |
        if (-Not (Test-Path "${{ env.PROJECT_PATH }}")) {
          Write-Error "project.json not found at ${{ env.PROJECT_PATH }}"
          exit 1
        }
        Write-Host "Project file validated successfully"

    - name: Install UiPath CLI
      shell: powershell
      run: |
        Write-Host "Installing UiPath CLI..."
        
        # Try installing the latest available version without version constraint
        dotnet tool install --global UiPath.CLI 2>&1 | Out-String | ForEach-Object { Write-Host $_ }
        
        # Add .dotnet tools to PATH
        $dotnetToolsPath = "$env:USERPROFILE\.dotnet\tools"
        if ($dotnetToolsPath -notin $env:PATH.Split(';')) {
          $env:PATH = "$dotnetToolsPath;$env:PATH"
          Write-Host "Added .dotnet tools to PATH"
        }
        
        # Verify installation
        $cliPath = "$dotnetToolsPath\uipath.exe"
        if (Test-Path $cliPath) {
          Write-Host "UiPath CLI installed at: $cliPath"
          & $cliPath --version
        } else {
          Write-Host "Attempting alternative installation method..."
          dotnet tool install --global UiPath.CLI --version 22.* 2>&1 | Out-String | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to install UiPath CLI"
            exit 1
          }
        }

    - name: Create Artifact Directory
      shell: powershell
      run: |
        if (-Not (Test-Path "${{ env.ARTIFACT_DIR }}")) {
          New-Item -ItemType Directory -Path "${{ env.ARTIFACT_DIR }}" -Force | Out-Null
          Write-Host "Artifact directory created: ${{ env.ARTIFACT_DIR }}"
        }

    - name: Validate Project
      shell: powershell
      run: |
        Write-Host "Validating UiPath project..."
        
        $cliPath = "$env:USERPROFILE\.dotnet\tools\uipath.exe"
        
        if (-Not (Test-Path $cliPath)) {
          Write-Error "UiPath CLI not found at $cliPath"
          exit 1
        }
        
        & $cliPath project validate -p "${{ env.PROJECT_PATH }}"
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Project validation failed"
          exit 1
        }

    - name: Pack Automation Project
      shell: powershell
      run: |
        Write-Host "Packing automation project..."
        
        $cliPath = "$env:USERPROFILE\.dotnet\tools\uipath.exe"
        
        & $cliPath project pack `
          -p "${{ env.PROJECT_PATH }}" `
          -o "${{ env.ARTIFACT_DIR }}" `
          -v 1.0.0
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Project pack failed"
          exit 1
        }
        
        Get-ChildItem "${{ env.ARTIFACT_DIR }}" | ForEach-Object { Write-Host "Generated: $_" }

    - name: Deploy to Orchestrator
      shell: powershell
      run: |
        Write-Host "Deploying package to Orchestrator..."
        
        $cliPath = "$env:USERPROFILE\.dotnet\tools\uipath.exe"
        $packagePath = Get-ChildItem "${{ env.ARTIFACT_DIR }}" -Filter "*.nupkg" | Select-Object -First 1
        
        if (-Not $packagePath) {
          Write-Error "No nupkg file found in ${{ env.ARTIFACT_DIR }}"
          exit 1
        }
        
        Write-Host "Deploying package: $($packagePath.FullName)"
        
        & $cliPath package deploy `
          --package "$($packagePath.FullName)" `
          --orchestrator-url "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
          --organization-unit "${{ secrets.UIPATH_ORGANIZATION }}" `
          --tenant "${{ secrets.UIPATH_TENANT }}" `
          --user-key "${{ secrets.UIPATH_USER_KEY }}" `
          --environment-type "staging" `
          --create-process-if-not-exists
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Package deployment failed"
          exit 1
        }
        
        Write-Host "Deployment completed successfully"

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: uipath-packages
        path: ${{ env.ARTIFACT_DIR }}
        retention-days: 30
