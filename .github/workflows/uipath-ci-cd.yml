name: UiPath CI/CD

on:
  push:
    branches:
      - develop
      - uat
      - main

jobs:

  build:

    runs-on: windows-latest

    outputs:
      packageVersion: ${{ steps.version.outputs.version }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup DotNet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install UiPath CLI
        shell: pwsh
        run: |
          dotnet tool install --global UiPath.CLI --ignore-failed-sources

      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $ver = "1.0.${{ github.run_number }}"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Output Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output

      - name: Pack Project
        shell: pwsh
        run: |
          uip rpa pack . output `
            --package-version "${{ steps.version.outputs.version }}"

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package
          path: output/*.nupkg

  deploy-dev:

    if: github.ref == 'refs/heads/develop'

    needs: build

    runs-on: windows-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: output

      - name: Install UiPath CLI updated
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://uipath.pkgs.visualstudio.com/Public.Feeds/_apis/packaging/feeds/UiPath-Official/nuget/packages/UiPath.CLI.Windows/versions/latest/content" `
            -OutFile uipcli.zip

          Expand-Archive uipcli.zip -DestinationPath uipcli -Force

          .\uipcli\uipcli.exe --version

      - name: Upload Package To Orchestrator
        shell: pwsh
        run: |
          $pkg = Get-ChildItem output\*.nupkg | Select-Object -First 1
          uip or packages upload $pkg.FullName

      - name: List DEV Processes
        shell: pwsh
        run: |
          uip or processes list --folder-path "${{ secrets.UIPATH_FOLDER_DEV }}"

  deploy-uat:

    if: github.ref == 'refs/heads/uat'

    needs: build

    runs-on: windows-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: output

      - name: Install UiPath CLI
        shell: pwsh
        run: |
          dotnet tool install --global UiPath.CLI --ignore-failed-sources

      - name: Upload Package To Orchestrator
        shell: pwsh
        run: |
          $pkg = Get-ChildItem output\*.nupkg | Select-Object -First 1
          uip or packages upload $pkg.FullName

      - name: List UAT Processes
        shell: pwsh
        run: |
          uip or processes list --folder-path "${{ secrets.UIPATH_FOLDER_UAT }}"

  deploy-prod:

    if: github.ref == 'refs/heads/main'

    needs: build

    runs-on: windows-latest

    environment: Production

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: output

      - name: Install UiPath CLI
        shell: pwsh
        run: |
          dotnet tool install --global UiPath.CLI --ignore-failed-sources

      - name: Upload Package To Orchestrator
        shell: pwsh
        run: |
          $pkg = Get-ChildItem output\*.nupkg | Select-Object -First 1
          uip or packages upload $pkg.FullName

      - name: Verify PROD Folder
        shell: pwsh
        run: |
          uip or processes list --folder-path "${{ secrets.UIPATH_FOLDER_PROD }}"