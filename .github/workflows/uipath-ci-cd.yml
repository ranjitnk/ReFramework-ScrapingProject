name: UiPath REFramework CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    
    env:
      UIPATH_ORCHESTRATOR_URL: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
      UIPATH_ORGANIZATION: ${{ secrets.UIPATH_ORGANIZATION }}
      UIPATH_TENANT: ${{ secrets.UIPATH_TENANT }}
      UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
      UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install UiPath CLI
      run: npm install -g @uipath/cli

    # FIXED: Changed from .\project.json to . (target folder context)
    - name: Restore Project Dependencies
      run: uip rpa restore .

    # FIXED: Changed from .\project.json to . (target folder context)
    - name: Validate UiPath Code Architecture
      run: uip rpa build .

    - name: Pack Automation Project
      run: uip rpa pack --output "artifacts/" .

    - name: Deploy Package to Orchestrator
      run: uip orchestrator deploy --package-path "artifacts/" --folder-name "Shared"
