name: UiPath CI/CD

on:
  push:
    branches:
      - develop
      - uat
      - main

jobs:

  build:

    runs-on: windows-latest

    outputs:
      packageVersion: ${{ steps.version.outputs.version }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $ver = "1.0.${{ github.run_number }}"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Output Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output

      - name: Pack Project
        shell: pwsh
        run: |
          uip rpa pack . output `
            --package-version "${{ steps.version.outputs.version }}"

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package
          path: output/*.nupkg

  deploy-prod:

    if: github.ref == 'refs/heads/main'

    needs: build

    runs-on: windows-latest

    environment: Production

    env:
      UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
      UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
      UIPATH_ORGANIZATION: ${{ secrets.UIPATH_ORGANIZATION }}
      UIPATH_TENANT: ${{ secrets.UIPATH_TENANT }}

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: uipath-package
          path: output

      - name: Login To UiPath
        shell: pwsh
        run: |
          uip login `
            --client-id $env:UIPATH_CLIENT_ID `
            --client-secret $env:UIPATH_CLIENT_SECRET `
            --organization $env:UIPATH_ORGANIZATION `
            --tenant $env:UIPATH_TENANT

      - name: Upload Package
        shell: pwsh
        run: |
          $pkg = Get-ChildItem output\*.nupkg | Select-Object -First 1
          uip or packages upload $pkg.FullName

      - name: Show Package Versions
        shell: pwsh
        run: |
          uip or packages versions REFramework.Scraping.with.Queue

      - name: Create Process If Needed
        shell: pwsh
        continue-on-error: true
        run: |
          uip or processes create `
            --folder-path "${{ secrets.UIPATH_FOLDER_PROD }}" `
            --name "REFramework Scraping with Queue" `
            --package-key "REFramework.Scraping.with.Queue" `
            --package-version "${{ needs.build.outputs.packageVersion }}"

      - name: Verify Process
        shell: pwsh
        run: |
          uip or processes list `
            --folder-path "${{ secrets.UIPATH_FOLDER_PROD }}"