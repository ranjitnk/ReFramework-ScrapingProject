name: UiPath CI/CD

on:
  push:
    branches:
      - develop
      - uat
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: windows-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install UiPath CLI
      shell: pwsh
      run: |
        dotnet tool install --global UiPath.CLI

    - name: Restore Dependencies
      shell: pwsh
      run: |
        uipcli package restore .

    - name: Pack Project
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path output
        uipcli package pack . --output output

    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: uipath-package
        path: output/*.nupkg

  deploy-dev:

    if: github.ref == 'refs/heads/develop'

    needs: build

    runs-on: windows-latest

    environment: Development

    steps:

    - uses: actions/download-artifact@v4
      with:
        name: uipath-package
        path: output

    - name: Install UiPath CLI
      shell: pwsh
      run: |
        dotnet tool install --global UiPath.CLI

    - name: Deploy DEV
      shell: pwsh
      run: |
        $package = Get-ChildItem output\*.nupkg | Select-Object -First 1

        uipcli package deploy `
          --packagePath $package.FullName `
          --orchestratorUrl "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
          --organization "${{ secrets.UIPATH_ORGANIZATION }}" `
          --tenant "${{ secrets.UIPATH_TENANT }}" `
          --applicationId "${{ secrets.UIPATH_CLIENT_ID }}" `
          --applicationSecret "${{ secrets.UIPATH_CLIENT_SECRET }}" `
          --folder "${{ secrets.UIPATH_DEV_FOLDER }}"

  deploy-uat:

    if: github.ref == 'refs/heads/uat'

    needs: build

    runs-on: windows-latest

    environment: UAT

    steps:

    - uses: actions/download-artifact@v4
      with:
        name: uipath-package
        path: output

    - name: Install UiPath CLI
      shell: pwsh
      run: |
        dotnet tool install --global UiPath.CLI

    - name: Deploy UAT
      shell: pwsh
      run: |
        $package = Get-ChildItem output\*.nupkg | Select-Object -First 1

        uipcli package deploy `
          --packagePath $package.FullName `
          --orchestratorUrl "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
          --organization "${{ secrets.UIPATH_ORGANIZATION }}" `
          --tenant "${{ secrets.UIPATH_TENANT }}" `
          --applicationId "${{ secrets.UIPATH_CLIENT_ID }}" `
          --applicationSecret "${{ secrets.UIPATH_CLIENT_SECRET }}" `
          --folder "${{ secrets.UIPATH_UAT_FOLDER }}"

  deploy-prod:

    if: github.ref == 'refs/heads/main'

    needs: build

    runs-on: windows-latest

    environment: Production

    steps:

    - uses: actions/download-artifact@v4
      with:
        name: uipath-package
        path: output

    - name: Install UiPath CLI
      shell: pwsh
      run: |
        dotnet tool install --global UiPath.CLI

    - name: Deploy PROD
      shell: pwsh
      run: |
        $package = Get-ChildItem output\*.nupkg | Select-Object -First 1

        uipcli package deploy `
          --packagePath $package.FullName `
          --orchestratorUrl "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
          --organization "${{ secrets.UIPATH_ORGANIZATION }}" `
          --tenant "${{ secrets.UIPATH_TENANT }}" `
          --applicationId "${{ secrets.UIPATH_CLIENT_ID }}" `
          --applicationSecret "${{ secrets.UIPATH_CLIENT_SECRET }}" `
          --folder "${{ secrets.UIPATH_PROD_FOLDER }}"