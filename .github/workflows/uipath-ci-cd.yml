name: UiPath REFramework CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # FIX 1: Install the native Windows UiPath Compiler Tools Bundle
    - name: Install Standalone UiPath CLI Tools
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://uipath.com" -OutFile "UiPathStudio.msi"
        Start-Process msiexec.exe -ArgumentList '/i UiPathStudio.msi /qn ADDLOCAL=DesktopFeature,Robot,Studio,CommandLineCLI' -Wait

    # FIX 2: Explicitly add the installation binaries directory to the pipeline PATH environment
    - name: Configure Execution Environment PATH
      shell: powershell
      run: |
        echo "C:\Program Files\UiPath\Studio" >> $GITHUB_PATH

    # FIX 3: Execute validation using the native architectural validation binary
    - name: Validate Legacy UiPath Architecture
      shell: powershell
      run: |
        UiPath.Studio.CommandLineArgs.exe analyze --project-path "project.json" --treat-warnings-as-errors false

    # FIX 4: Pack using the native compiler tool
    - name: Pack Legacy Automation Project
      shell: powershell
      run: |
        UiPath.Studio.CommandLineArgs.exe pack "project.json" -o "artifacts/" --skip-analysis

    # FIX 5: Deploy utilizing the native deployment wrapper engine
    - name: Deploy Package to Orchestrator
      shell: powershell
      run: |
        UiPath.Studio.CommandLineArgs.exe deploy --package-path "artifacts/" --folder-name "Shared" --url "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" --organization "${{ secrets.UIPATH_ORGANIZATION }}" --tenant "${{ secrets.UIPATH_TENANT }}" --client-id "${{ secrets.UIPATH_CLIENT_ID }}" --client-secret "${{ secrets.UIPATH_CLIENT_SECRET }}"
