name: UiPath REFramework CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Check UiPath Studio Installation
      shell: powershell
      run: |
        Write-Host "Checking for UiPath Studio..."
        $paths = @(
          "${env:ProgramFiles}\UiPath\Studio\UiPath.Studio.CommandLine.exe",
          "${env:ProgramFiles(x86)}\UiPath\Studio\UiPath.Studio.CommandLine.exe",
          "${env:LocalAppData}\Programs\UiPath\Studio\UiPath.Studio.CommandLine.exe"
        )
        
        $studioFound = $false
        foreach ($path in $paths) {
            if (Test-Path $path) {
                Write-Host "Found UiPath Studio CLI at: $path"
                $studioFound = $true
                break
            }
        }
        
        if (-not $studioFound) {
            Write-Error "UiPath Studio CommandLine tool not found on this self-hosted runner!"
            exit 1
        }

    - name: Find UiPath Command Line Tools
      id: find-cli
      shell: powershell
      run: |
        $paths = @(
          "${env:ProgramFiles}\UiPath\Studio\UiPath.Studio.CommandLine.exe",
          "${env:ProgramFiles(x86)}\UiPath\Studio\UiPath.Studio.CommandLine.exe",
          "${env:LocalAppData}\Programs\UiPath\Studio\UiPath.Studio.CommandLine.exe"
        )
        foreach ($path in $paths) {
            if (Test-Path $path) {
                echo "uipath_cli=$path" >> $env:GITHUB_OUTPUT
                exit 0
            }
        }
        Write-Error "UiPath CLI tool could not be located."
        exit 1

    - name: Create Artifact Directory
      run: mkdir -p build/packages

    - name: Validate Project (Workflow Analyzer)
      shell: powershell
      run: |
        $cli = "${{ steps.find-cli.outputs.uipath_cli }}"
        Write-Host "Running Workflow Analyzer..."
        & $cli analyze --project-path "project.json"

    - name: Pack Automation Project
      shell: powershell
      run: |
        $cli = "${{ steps.find-cli.outputs.uipath_cli }}"
        Write-Host "Packaging REFramework project..."
        & $cli pack "project.json" --output "build/packages" --output-kind Project

    # ADDED: Upload step using the official UiPath Deploy Action and your GitHub Secrets
    - name: Deploy Package to UiPath Orchestrator
      uses: UiPath/uipath-actions/UipathDeploy@v2
      with:
        orchestratorUrl: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
        # If using Cloud Orchestrator (User Key/Refresh Token authentication method)
        userKey: ${{ secrets.UIPATH_USER_KEY }}
        tenantName: ${{ secrets.UIPATH_TENANT_NAME }}
        # If using modern external application/OAuth credentials, use these instead:
        # clientId: ${{ secrets.UIPATH_CLIENT_ID }}
        # clientSecret: ${{ secrets.UIPATH_CLIENT_SECRET }}
        folderName: 'Shared' # Change this to your specific Orchestrator Folder name
        packagePath: 'build/packages'

    - name: Upload Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: uipath-package
        path: build/packages/