name: UiPath REFramework CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    
    env:
      UIPATH_ORCHESTRATOR_URL: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
      UIPATH_ORGANIZATION: ${{ secrets.UIPATH_ORGANIZATION }}
      UIPATH_TENANT: ${{ secrets.UIPATH_TENANT }}
      UIPATH_CLIENT_ID: ${{ secrets.UIPATH_CLIENT_ID }}
      UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install UiPath CLI
      run: npm install -g @uipath/cli
    
    - name: Restore Project Dependencies
      run: uip rpa restore .\project.json

    # Added target-framework flag to resolve basic .NET data types
    - name: Validate UiPath Code Architecture
      run: >
        uip rpa-legacy validate .\project.json 
        --target-framework "Windows"
        --orchestrator-url "$env:UIPATH_ORCHESTRATOR_URL" 
        --organization "$env:UIPATH_ORGANIZATION" 
        --tenant "$env:UIPATH_TENANT" 
        --client-id "$env:UIPATH_CLIENT_ID" 
        --client-secret "$env:UIPATH_CLIENT_SECRET"

    # Added target-framework flag here as well to ensure a clean compilation
    - name: Pack Automation Project
      run: uip rpa-legacy pack . --target-framework "Windows" --output "artifacts/"

    - name: Deploy Package to Orchestrator
      run: >
        uip orchestrator deploy --package-path "artifacts/" --folder-name "Shared" 
        --orchestrator-url "$env:UIPATH_ORCHESTRATOR_URL" 
        --organization "$env:UIPATH_ORGANIZATION" 
        --tenant "$env:UIPATH_TENANT" 
        --client-id "$env:UIPATH_CLIENT_ID" 
        --client-secret "$env:UIPATH_CLIENT_SECRET"