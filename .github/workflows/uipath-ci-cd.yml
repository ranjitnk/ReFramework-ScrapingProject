name: UiPath REFramework CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  ARTIFACT_DIR: ./artifacts
  PROJECT_PATH: ./project.json
  UIPATH_STUDIO_PATH: "C:\\Program Files\\UiPath\\Studio"

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Validate Project File
      shell: powershell
      run: |
        if (-Not (Test-Path "${{ env.PROJECT_PATH }}")) {
          Write-Error "project.json not found at ${{ env.PROJECT_PATH }}"
          exit 1
        }
        Write-Host "[OK] Project file found: ${{ env.PROJECT_PATH }}"

    - name: Find UiPath Command Line Tools
      shell: powershell
      run: |
        Write-Host "Searching for UiPath command line tools..."
        
        # Check if Studio is installed
        if (Test-Path "${{ env.UIPATH_STUDIO_PATH }}") {
          Write-Host "[OK] UiPath Studio found at ${{ env.UIPATH_STUDIO_PATH }}"
          $env:PATH = "${{ env.UIPATH_STUDIO_PATH }};$env:PATH"
          Write-Host "Added to PATH: ${{ env.UIPATH_STUDIO_PATH }}"
        } else {
          Write-Host "[WARN] UiPath Studio not found at default location"
          Write-Host "Checking Program Files for UiPath installations..."
          $studioPath = Get-ChildItem -Path "C:\Program Files" -Filter "UiPath" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($studioPath) {
            Write-Host "Found: $($studioPath.FullName)"
            $env:PATH = "$($studioPath.FullName);$env:PATH"
          }
        }
        
        # Try to find the CLI executable
        $cliExe = "UiPath.Studio.CommandLine.exe"
        $found = Get-Command $cliExe -ErrorAction SilentlyContinue
        
        if ($found) {
          Write-Host "[OK] Found $cliExe at: $($found.Source)"
        } else {
          Write-Host "[WARN] UiPath Studio CLI not found in PATH"
          Write-Host "INFO: Make sure UiPath Studio is installed with CLI tools enabled"
        }

    - name: Create Artifact Directory
      shell: powershell
      run: |
        if (-Not (Test-Path "${{ env.ARTIFACT_DIR }}")) {
          New-Item -ItemType Directory -Path "${{ env.ARTIFACT_DIR }}" -Force | Out-Null
          Write-Host "[OK] Created artifact directory: ${{ env.ARTIFACT_DIR }}"
        } else {
          Write-Host "[OK] Artifact directory exists"
        }

    - name: Validate Project
      shell: powershell
      run: |
        Write-Host "Validating project architecture..."
        
        try {
          UiPath.Studio.CommandLine.exe analyze --project-path "${{ env.PROJECT_PATH }}" --treat-warnings-as-errors false
          Write-Host "[OK] Project validation passed"
        } catch {
          Write-Host "[WARN] Validation tool may not be available, continuing..."
        }

    - name: Pack Automation Project
      shell: powershell
      run: |
        Write-Host "Packing project as NuGet package..."
        
        try {
          UiPath.Studio.CommandLine.exe pack "${{ env.PROJECT_PATH }}" -o "${{ env.ARTIFACT_DIR }}" 2>&1
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Package created successfully"
            Get-ChildItem "${{ env.ARTIFACT_DIR }}" -Filter "*.nupkg" | ForEach-Object { 
              Write-Host "Generated package: $($_.Name) ($('{0:N2}' -f ($_.Length / 1MB)) MB)"
            }
          } else {
            Write-Error "Packing failed with exit code $LASTEXITCODE"
            exit 1
          }
        } catch {
          Write-Error "Error during packing: $_"
          exit 1
        }

    - name: Deploy to Orchestrator
      shell: powershell
      run: |
        Write-Host "Preparing deployment to Orchestrator..."
        
        $packagePath = Get-ChildItem "${{ env.ARTIFACT_DIR }}" -Filter "*.nupkg" | Select-Object -First 1
        
        if (-Not $packagePath) {
          Write-Error "No package found in ${{ env.ARTIFACT_DIR }}"
          exit 1
        }
        
        Write-Host "Package to deploy: $($packagePath.Name)"
        Write-Host "Orchestrator URL: ${{ secrets.UIPATH_ORCHESTRATOR_URL }}"
        
        try {
          UiPath.Studio.CommandLine.exe deploy "$($packagePath.FullName)" `
            --url "${{ secrets.UIPATH_ORCHESTRATOR_URL }}" `
            --organization "${{ secrets.UIPATH_ORGANIZATION }}" `
            --tenant "${{ secrets.UIPATH_TENANT }}" `
            --client-id "${{ secrets.UIPATH_CLIENT_ID }}" `
            --client-secret "${{ secrets.UIPATH_CLIENT_SECRET }}"
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Deployment completed successfully"
          } else {
            Write-Error "Deployment failed with exit code $LASTEXITCODE"
            exit 1
          }
        } catch {
          Write-Error "Error during deployment: $_"
          exit 1
        }

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: uipath-packages
        path: ${{ env.ARTIFACT_DIR }}
        retention-days: 30
